services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    volumes:
      - routeforge_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/routeforge.db
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
  frontend:
    build:
      context: ./frontend
    ports: ["3000:80"]
    depends_on: [backend]
volumes:
  routeforge_data:
