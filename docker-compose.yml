services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    volumes:
      - routeforge_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/routeforge.db
      - CORS_ORIGINS=http://192.168.58.167:3000,http://127.0.0.1:3000
  frontend:
    build: ./frontend
    ports: ["3000:80"]
    environment:
      - VITE_API_URL=http://192.168.58.167:8000
    depends_on: [backend]
volumes:
  routeforge_data:
